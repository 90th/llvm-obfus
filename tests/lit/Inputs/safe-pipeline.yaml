seed: 10101
default_level: none
targets:
  - match: main
    level: strong
  - match: value
    level: strong
  - match: fold_value
    level: vm
string_encoding:
  prefer_lazy_decode: true
  allow_ctor_fallback: true
constant_encoding:
  max_constants_per_function: 1
  min_bit_width: 8
block_split:
  max_splits_per_function: 1
  min_instructions_per_block: 2
