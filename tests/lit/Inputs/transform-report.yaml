seed: 77
default_level: none
overrides:
  - name: keep_plain
    level: none
targets:
  - match: split_me
    level: strong
  - match: vm_me
    level: vm
  - match: main
    level: strong
block_split:
  max_splits_per_function: 1
  min_instructions_per_block: 2
string_encoding:
  prefer_lazy_decode: true
  allow_ctor_fallback: true
constant_encoding:
  max_constants_per_function: 1
  min_bit_width: 8
